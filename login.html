<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoConnect | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR (fixed consistency) -->
<nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="index.html">🌿 EcoConnect</a>
    </div>
</nav>

<!-- LOGIN WRAPPER -->
<div class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">

    <div class="card p-4 shadow-sm" style="width: 380px; border-radius: 20px;">

        <h3 class="text-center fw-bold mb-1">Welcome Back</h3>
        <p class="text-center text-muted small mb-4">
            Login to continue your green journey 🌱
        </p>

        <form>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter Email">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter Password">
            </div>

            <!-- FIXED BUTTON -->
            <button type="button" class="btn btn-eco w-100"
                    onclick="window.location.href='#'">
                Login
            </button>

        </form>

        <a href="#" class="small text-success text-decoration-none"> Forgot your password?</a>
        


    </div>

</div>

<!-- FOOTER -->
<footer class="bg-dark text-white py-4 text-center">
    <p class="mb-0">© 2026 EcoConnect - Supporting Earth Together</p>
</footer>

</body>
</html>
